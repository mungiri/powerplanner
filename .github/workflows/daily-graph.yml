name: 파워플래너 일일 사용량 그래프 (비활성 — 로컬 이전됨)

# ⚠️ 한전이 GitHub Actions 해외 IP 를 차단(2026-07)하여 이 워크플로에서는
#    조회가 불가능하다. 실제 실행은 한국 IP 인 로컬 PC(Windows 작업 스케줄러)로 이전했다.
#    cron-job.org 호출이 남아 있어도 아래 job 은 아무 것도 하지 않으므로 실패 알림이 오지 않는다.

on:
  workflow_dispatch:
    inputs:
      date:
        description: "(미사용) 로컬 실행으로 이전됨"
        required: false
        default: ""

permissions:
  contents: read

jobs:
  noop:
    runs-on: ubuntu-latest
    steps:
      - name: 안내
        run: echo "이 워크플로는 로컬 실행으로 이전되어 비활성 상태입니다. (한전 해외 IP 차단)"
